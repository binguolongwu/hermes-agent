name: Sync Fork

# 定义触发条件
on:
  # 1. 通过定时任务触发：示例为每30分钟检查一次
  schedule:
    - cron: '*/30 * * * *'
  # 2. 手动触发：你可以在 GitHub 的 Actions 页面点击按钮手动运行
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 使用一个专门用于同步 fork 的 Action
      - name: Sync Fork
        uses: tgymnich/fork-sync@v1.8
        with:
          # 上游仓库的拥有者名称
          owner: NousResearch
          # 上游仓库的名称
          base: hermes-agent
          # 要同步到的分支，通常为 main
          head: main
          # 同步方式，默认为 merge
          # 如需使用 force push 可以设置，但需谨慎
          # method: merge
